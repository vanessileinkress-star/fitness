<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Overview | April 2026</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="topbar">
    <h1>Health Overview</h1>
    <p>April 14–20, 2026 · Activity & Recovery Analytics</p>
</header>

<main class="container">

    <section class="card">
        <div class="card-text">
            <h2>Sleep</h2>
            <p class="sub">Recovery & duration trends</p>

            <div class="kpi">
                <div>
                    <span class="label">Average</span>
                    <span class="value">8.2 h</span>
                </div>
                <div>
                    <span class="label">Status</span>
                    <span class="value good">Optimal</span>
                </div>
            </div>
        </div>

        <canvas id="sleepChart"></canvas>
    </section>


    <section class="card">
        <div class="card-text">
            <h2>Body Strain</h2>
            <p class="sub">Load & stress response</p>

            <div class="kpi">
                <div>
                    <span class="label">Peak</span>
                    <span class="value warn">31.7</span>
                </div>
                <div>
                    <span class="label">Status</span>
                    <span class="value">Stable</span>
                </div>
            </div>
        </div>

        <canvas id="stressChart"></canvas>
    </section>


    <section class="card">
        <div class="card-text">
            <h2>Steps</h2>
            <p class="sub">Daily movement volume</p>

            <div class="kpi">
                <div>
                    <span class="label">Average</span>
                    <span class="value">10.1k</span>
                </div>
                <div>
                    <span class="label">Goal</span>
                    <span class="value good">Met</span>
                </div>
            </div>
        </div>

        <canvas id="stepsChart"></canvas>
    </section>


    <section class="card">
        <div class="card-text">
            <h2>Training Mix</h2>
            <p class="sub">Weekly activity distribution</p>
        </div>

        <canvas id="activityChart"></canvas>
    </section>

</main>

<script src="app.js"></script>

</body>
</html>
